name: CI – standalone-yuque-fetcher

on:
  push:
    paths:
      - "standalone-yuque-fetcher/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "standalone-yuque-fetcher/**"
      - ".github/workflows/ci.yml"

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r standalone-yuque-fetcher/scripts/requirements.txt

      - name: Script self-check (no args → exit 0)
        # The script fetches the default public URL.
        # If the network request fails (e.g. the page returns a non-200
        # status, or no selector matches), the script exits non-zero.
        # We accept exit codes 0 or 3 here:
        #   0 = content extracted successfully
        #   3 = page reachable but no selector matched (still "ran OK")
        run: |
          python standalone-yuque-fetcher/scripts/fetch_yuque.py \
            --timeout 30 --verbose; \
          code=$?; \
          if [ $code -eq 0 ] || [ $code -eq 3 ]; then
            echo "Self-check passed (exit code $code)."
            exit 0
          else
            echo "Self-check FAILED (exit code $code)."
            exit $code
          fi

      # Optional Playwright step — disabled by default.
      # To enable, set the repository variable ENABLE_PLAYWRIGHT=true.
      - name: Install Playwright (optional)
        if: ${{ vars.ENABLE_PLAYWRIGHT == 'true' }}
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Script self-check with Playwright (optional)
        if: ${{ vars.ENABLE_PLAYWRIGHT == 'true' }}
        run: |
          python standalone-yuque-fetcher/scripts/fetch_yuque.py \
            --render --timeout 60 --verbose
